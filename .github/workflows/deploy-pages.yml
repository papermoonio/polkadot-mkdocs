name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      content_branch:
        description: "Branch of polkadot-developers/polkadot-docs to build from"
        required: true
        default: "master"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish rather than
# cancelling it (a half-published Pages deploy is worse than a queued one).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout framework repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git-revision-date-localized under --strict

      - name: Checkout content repo into polkadot-docs/
        uses: actions/checkout@v4
        with:
          repository: polkadot-developers/polkadot-docs
          ref: ${{ github.event.inputs.content_branch || 'master' }}
          path: polkadot-docs
          fetch-depth: 0   # full history: required for git-revision-date under --strict

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install imaging libs (social cards)
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev

      - name: Cache Material social cards
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ github.run_id }}
          restore-keys: mkdocs-material-
          path: .cache

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build site
        run: mkdocs build --strict -d site

      - name: Generate client-side redirect stubs (GH Pages has no server-side 301s)
        run: python scripts/gen_redirects.py --site-dir site --redirects redirects.json

      - name: Set custom domain
        run: echo "docs.polkadot.com" > site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
